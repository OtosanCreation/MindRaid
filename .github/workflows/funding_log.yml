name: Funding Logger

on:
  workflow_dispatch:        # cron-job.orgから外部トリガー（30分精確）

jobs:
  log-funding:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # CSV を push するために必要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (CJK)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run funding logger
        env:
          LIGHTER_API_PRIVATE_KEY: ${{ secrets.LIGHTER_API_PRIVATE_KEY }}
          LIGHTER_ACCOUNT_INDEX: ${{ secrets.LIGHTER_ACCOUNT_INDEX }}
          EXCHANGE_MODE: ${{ secrets.EXCHANGE_MODE }}
        run: python funding_logger.py

      - name: Generate dashboard image
        run: python generate_image.py

      - name: Run taker bot
        continue-on-error: true
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          LIGHTER_API_PRIVATE_KEY: ${{ secrets.LIGHTER_API_PRIVATE_KEY }}
          LIGHTER_ACCOUNT_INDEX: ${{ secrets.LIGHTER_ACCOUNT_INDEX }}
          EXCHANGE_MODE: ${{ secrets.EXCHANGE_MODE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python taker_bot.py

      - name: Send Telegram alert
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          LIGHTER_API_PRIVATE_KEY: ${{ secrets.LIGHTER_API_PRIVATE_KEY }}
          LIGHTER_ACCOUNT_INDEX: ${{ secrets.LIGHTER_ACCOUNT_INDEX }}
          EXCHANGE_MODE: ${{ secrets.EXCHANGE_MODE }}
        run: python telegram_alert.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funding_log.csv images/dashboard.png
          [ -f data/lighter_funding_log.csv ] && git add data/lighter_funding_log.csv || true
          [ -f data/taker_state.json ] && git add data/taker_state.json || true
          [ -f data/pnl_snapshot.json ] && git add data/pnl_snapshot.json || true
          git diff --staged --quiet || git commit -m "log: funding $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push

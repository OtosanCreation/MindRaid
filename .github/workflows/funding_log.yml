name: Funding Logger

on:
  schedule:
    - cron: '0 * * * *'   # 毎時 0 分（UTC）に実行
  workflow_dispatch:        # GitHub UI から手動実行も可

jobs:
  log-funding:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # CSV を push するために必要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (CJK)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run funding logger
        run: python funding_logger.py

      - name: Run CEX logger
        run: python fetch_cex.py

      - name: Generate dashboard image
        run: python generate_image.py

      - name: Post to X (Twitter)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_x.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funding_log.csv data/cex_log.csv images/dashboard.png
          git diff --staged --quiet || git commit -m "log: funding $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

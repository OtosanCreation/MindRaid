name: Funding Logger

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分毎（UTC）に実行
  workflow_dispatch:        # GitHub UI から手動実行も可

jobs:
  log-funding:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # CSV を push するために必要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (CJK)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run funding logger
        run: python funding_logger.py

      - name: Generate dashboard image
        run: python generate_image.py

      - name: Send Telegram alert
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_alert.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funding_log.csv data/mexc_funding_log.csv images/dashboard.png
          git diff --staged --quiet || git commit -m "log: funding $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

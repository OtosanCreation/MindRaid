name: Funding Logger

on:
  schedule:
    - cron: '0 * * * *'   # 毎時 0 分（UTC）に実行
  workflow_dispatch:        # GitHub UI から手動実行も可

jobs:
  log-funding:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # CSV を push するために必要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run funding logger
        run: python funding_logger.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funding_log.csv
          git diff --staged --quiet || git commit -m "log: funding $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
